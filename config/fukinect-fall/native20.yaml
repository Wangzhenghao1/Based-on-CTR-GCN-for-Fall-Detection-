work_dir: ./work_dir/fukinect-fall/native20/ctrgcn_joint

feeder: feeders.feeder_fukinect.Feeder
train_feeder_args:
  data_path: data/fukinect_fall/fukinect20_fall_subject.npz
  split: train
  debug: False
  random_choose: False
  random_shift: False
  random_move: False
  window_size: 64
  normalization: False
  random_rot: True
  p_interval: [0.85, 1.0]
  vel: False
  bone: False

test_feeder_args:
  data_path: data/fukinect_fall/fukinect20_fall_subject.npz
  split: test
  window_size: 64
  p_interval: [0.95]
  vel: False
  bone: False
  debug: False

model: model.ctrgcn.Model
model_args:
  num_class: 2
  num_point: 20
  num_person: 1
  graph: graph.fukinect.Graph
  graph_args:
    labeling_mode: 'spatial'
  in_channels: 3

weight_decay: 0.0004
base_lr: 0.05
lr_decay_rate: 0.1
step: [35, 55]
warm_up_epoch: 5

device: [0]
batch_size: 32
test_batch_size: 64
num_epoch: 65
nesterov: True
